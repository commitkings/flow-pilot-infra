apiVersion: apps/v1
kind: Deployment
metadata:
  name: flow-pilot-frontend
  namespace: flow-pilot
  labels:
    app: flow-pilot-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flow-pilot-frontend
  template:
    metadata:
      labels:
        app: flow-pilot-frontend
    spec:
      imagePullSecrets:
      - name: harbor-registry-secret
      containers:
      - name: frontend
        image: 164.68.119.226:30002/flowpilot/flowpilot-frontend:1.0.10
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: frontend-config
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 5
